<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SVI vs Crashes</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:'Inter',sans-serif;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px}
#wrap{background:#fff;border:1px solid #e8e5e0;border-radius:14px;padding:22px 26px;max-width:760px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.07)}
#ct{font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:3px}
#cs{font-size:11px;color:#999;margin-bottom:14px}
canvas{width:100%;height:400px;cursor:crosshair;display:block;border-radius:8px}
#tt{margin-top:12px;min-height:54px;background:#fafaf8;border:1px solid #eee;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:14px}
#tt.e{opacity:.3}
#ttd{width:13px;height:13px;border-radius:50%;border:2px solid white;box-shadow:0 0 0 1.5px rgba(0,0,0,.15);flex-shrink:0}
#tti{flex:1}#ttn{font-size:13px;font-weight:600;color:#1a1a2e}#tts{font-size:10px;color:#999;margin-top:1px}
.tm{text-align:center;min-width:64px}.tv{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;color:#1a1a2e}.tk{font-size:9px;color:#bbb;text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
#tq{margin-left:auto;font-size:10px;font-weight:600;padding:4px 9px;border-radius:5px;white-space:nowrap;flex-shrink:0}
#lr{display:flex;gap:18px;margin-top:13px;justify-content:center}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:#666}
.ld{border-radius:50%;border:2px solid white;box-shadow:0 0 0 1px rgba(0,0,0,.15);flex-shrink:0}
</style></head><body>
<div id="wrap">
<div id="ct">SVI Score vs. Serious Crashes by Station</div>
<div id="cs">Roosevelt Boulevard Subway Corridor · Philadelphia, PA · PennDOT 2024 & CDC SVI 2022</div>
<canvas id="sc"></canvas>
<div id="tt" class="e">
  <div id="ttd"></div><div id="tti"><div id="ttn">Hover a station</div><div id="tts"></div></div>
  <div class="tm"><div class="tv" id="tsvi">—</div><div class="tk">SVI Score</div></div>
  <div class="tm"><div class="tv" id="tcr">—</div><div class="tk">Crashes</div></div>
  <div id="tq"></div>
</div>
<div id="lr">
  <div class="li"><div class="ld" style="width:11px;height:11px;background:#2E5FA3"></div>Underground</div>
  <div class="li"><div class="ld" style="width:11px;height:11px;background:#4EAA72"></div>At-Grade</div>
  <div class="li"><div class="ld" style="width:11px;height:11px;background:#E8433A"></div>Elevated</div>
</div></div>
<script>
const DATA={"Bustleton": {"svi": 0.916, "crashes": 18, "segment": "Underground"}, "Rising Sun": {"svi": 0.924, "crashes": 9, "segment": "Underground"}, "Cottman": {"svi": 0.746, "crashes": 12, "segment": "Underground"}, "Broad-Erie": {"svi": 0.975, "crashes": 7, "segment": "Underground"}, "North 9th": {"svi": 0.953, "crashes": 7, "segment": "Underground"}, "Welsh-Grant": {"svi": 0.836, "crashes": 8, "segment": "Elevated"}, "Adams": {"svi": 0.909, "crashes": 5, "segment": "At-Grade"}, "Pratt": {"svi": 0.898, "crashes": 4, "segment": "Underground"}, "Rhawn": {"svi": 0.726, "crashes": 4, "segment": "Underground"}, "Red Lion": {"svi": 0.87, "crashes": 0, "segment": "Elevated"}, "Southampton": {"svi": 0.751, "crashes": 1, "segment": "Elevated"}, "Old Lincoln": {"svi": 0.416, "crashes": 0, "segment": "Elevated"}};
const SVI_M=0.827,CR_M=6.2;
const SC={"Underground":"#2E5FA3","At-Grade":"#4EAA72","Elevated":"#E8433A"};
const LP={"Bustleton":{a:'r',ox:12,oy:0},"Rising Sun":{a:'r',ox:12,oy:-10},"Cottman":{a:'l',ox:-12,oy:0},"Broad-Erie":{a:'r',ox:12,oy:12},"North 9th":{a:'r',ox:12,oy:-6},"Welsh-Grant":{a:'l',ox:-12,oy:0},"Adams":{a:'r',ox:12,oy:0},"Pratt":{a:'l',ox:-12,oy:0},"Rhawn":{a:'l',ox:-12,oy:0},"Red Lion":{a:'r',ox:12,oy:12},"Southampton":{a:'l',ox:-12,oy:0},"Old Lincoln":{a:'r',ox:12,oy:0}};
function Q(s,c){const hi=s>=SVI_M,hc=c>=CR_M;if(hi&&hc)return{l:"High SVI · High Crashes",bg:"#FFE8E8",c:"#C62828"};if(!hi&&hc)return{l:"Low SVI · High Crashes",bg:"#F5F5F5",c:"#888"};if(hi&&!hc)return{l:"High SVI · Low Crashes",bg:"#F5F5F5",c:"#888"};return{l:"Low SVI · Low Crashes",bg:"#F5F5F5",c:"#888"};}
let hov=null;
function draw(hl=null){
  const cv=document.getElementById('sc');const dpr=window.devicePixelRatio||1;
  const W=cv.clientWidth,H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);
  const p={t:30,r:30,b:46,l:46},pw=W-p.l-p.r,ph=H-p.t-p.b;
  const SX=(v)=>p.l+(v-.35)/(.69)*pw,SY=(v)=>p.t+(1-(v+.5)/22)*ph;
  const mx=SX(SVI_M),my=SY(CR_M);
  ctx.fillStyle='#fafafa';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(232,67,58,.05)';ctx.fillRect(mx,p.t,pw-(mx-p.l),my-p.t);
  ctx.strokeStyle='#efefef';ctx.lineWidth=1;
  for(let i=0;i<=6;i++){const x=p.l+i/6*pw;ctx.beginPath();ctx.moveTo(x,p.t);ctx.lineTo(x,p.t+ph);ctx.stroke();const y=p.t+i/6*ph;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(p.l+pw,y);ctx.stroke();}
  ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.setLineDash([5,4]);
  ctx.beginPath();ctx.moveTo(mx,p.t);ctx.lineTo(mx,p.t+ph);ctx.stroke();
  ctx.beginPath();ctx.moveTo(p.l,my);ctx.lineTo(p.l+pw,my);ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle='#ccc';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(p.l,p.t);ctx.lineTo(p.l,p.t+ph);ctx.lineTo(p.l+pw,p.t+ph);ctx.stroke();
  ctx.fillStyle='#aaa';ctx.font='10px Inter';ctx.textAlign='center';
  [.4,.5,.6,.7,.8,.9,1.0].forEach(v=>ctx.fillText(v.toFixed(1),SX(v),p.t+ph+16));
  ctx.textAlign='right';[0,5,10,15,20].forEach(v=>ctx.fillText(v,p.l-6,SY(v)+4));
  ctx.fillStyle='#888';ctx.font='11px Inter';ctx.textAlign='center';
  ctx.fillText('Avg SVI Score (Social Vulnerability)',p.l+pw/2,H-6);
  ctx.save();ctx.translate(13,p.t+ph/2);ctx.rotate(-Math.PI/2);ctx.fillText('Serious Crashes (2024)',0,0);ctx.restore();
  ctx.font='9px Inter';ctx.fillStyle='#bbb';ctx.textAlign='center';
  ctx.fillText('Mean SVI = '+SVI_M,mx,p.t-10);ctx.textAlign='left';ctx.fillText('Mean = '+CR_M,p.l+pw+4,my+4);
  ctx.font='bold 8px Inter';ctx.fillStyle='#C62828';ctx.textAlign='right';ctx.fillText('High SVI · High Crashes',p.l+pw-4,p.t+13);
  ctx.fillStyle='#ccc';ctx.textAlign='left';ctx.fillText('Low SVI · High Crashes',p.l+4,p.t+13);
  ctx.textAlign='right';ctx.fillText('High SVI · Low Crashes',p.l+pw-4,p.t+ph-6);
  ctx.textAlign='left';ctx.fillText('Low SVI · Low Crashes',p.l+4,p.t+ph-6);
  Object.entries(DATA).forEach(([name,d])=>{
    const x=SX(d.svi),y=SY(d.crashes),c=SC[d.segment],isHL=name===hl,r=isHL?9:6.5;
    if(isHL){ctx.beginPath();ctx.arc(x,y,r+5,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,.07)';ctx.fill();}
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();ctx.strokeStyle='white';ctx.lineWidth=2;ctx.stroke();
    const lp=LP[name]||{a:'r',ox:8,oy:0};ctx.font=(isHL?'600 ':'')+'10px Inter';
    const tm=ctx.measureText(name);const lx=x+lp.ox,ly=y+lp.oy;
    const bx=lp.a==='l'?lx-tm.width-4:lx-2;ctx.fillStyle='rgba(255,255,255,.85)';ctx.fillRect(bx,ly-11,tm.width+6,14);
    ctx.fillStyle=isHL?c:'#333';ctx.textAlign=lp.a==='l'?'right':'left';ctx.fillText(name,lp.a==='l'?lx:lx,ly);
  });
}
const cv=document.getElementById('sc');
function getHit(e){
  const r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  const W=cv.clientWidth,H=cv.clientHeight,p={t:30,r:30,b:46,l:46},pw=W-p.l-p.r,ph=H-p.t-p.b;
  const SX=(v)=>p.l+(v-.35)/(.69)*pw,SY=(v)=>p.t+(1-(v+.5)/22)*ph;
  let cl=null,md=18;
  Object.entries(DATA).forEach(([n,d])=>{const dx=mx-SX(d.svi),dy=my-SY(d.crashes),di=Math.sqrt(dx*dx+dy*dy);if(di<md){md=di;cl=n;}});
  return cl;
}
cv.addEventListener('mousemove',e=>{const h=getHit(e);cv.style.cursor=h?'pointer':'crosshair';if(h!==hov){hov=h;draw(h);const tt=document.getElementById('tt');if(h){const d=DATA[h],q=Q(d.svi,d.crashes),c=SC[d.segment];tt.classList.remove('e');document.getElementById('ttd').style.background=c;document.getElementById('ttn').textContent=h;document.getElementById('ttn').style.color=c;document.getElementById('tts').textContent=d.segment+' Station';document.getElementById('tsvi').textContent=d.svi.toFixed(3);document.getElementById('tcr').textContent=d.crashes+' crashes';const qe=document.getElementById('tq');qe.textContent=q.l;qe.style.background=q.bg;qe.style.color=q.c;}else tt.classList.add('e');}});
cv.addEventListener('mouseleave',()=>{hov=null;draw(null);document.getElementById('tt').classList.add('e');});
window.addEventListener('load',()=>draw());window.addEventListener('resize',()=>draw(hov));
</script></body></html>
