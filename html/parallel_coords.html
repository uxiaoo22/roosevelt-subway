<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Station Profile — Parallel Coordinates</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0b0f14; color: #e8e2d8; font-family: 'Lato', sans-serif; font-weight: 300; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

.header { padding: 1.5rem 2.5rem 0.8rem; flex-shrink: 0; }
.header-top { display: flex; align-items: baseline; gap: 1.2rem; margin-bottom: 0.3rem; }
.tag { font-family: 'Inconsolata', monospace; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #7a8898; }
h1 { font-size: 1.1rem; font-weight: 400; color: #e8e2d8; }
.subtitle { font-family: 'Inconsolata', monospace; font-size: 0.68rem; color: #7a8898; }

#chart { flex: 1; width: 100%; }

.axis-label {
  font-family: 'Inconsolata', monospace;
  font-size: 11px;
  fill: #7a8898;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.axis-tick {
  font-family: 'Inconsolata', monospace;
  font-size: 10px;
  fill: #4a5568;
}
.axis-line { stroke: #1f2d3d; stroke-width: 1.5; }

.station-line {
  fill: none;
  stroke-width: 2;
  opacity: 0.5;
  cursor: pointer;
  transition: opacity 0.2s, stroke-width 0.2s;
}
.station-line:hover { opacity: 1; stroke-width: 3; }
.station-line.faded { opacity: 0.08; }
.station-line.highlighted { opacity: 1; stroke-width: 3.5; }

.station-dot {
  opacity: 0.5;
  cursor: pointer;
  transition: opacity 0.2s, r 0.2s;
}
.station-dot.faded { opacity: 0.08; }
.station-dot.highlighted { opacity: 1; }

/* Tooltip */
.tooltip {
  position: fixed;
  background: #161e28;
  border: 1px solid #1f2d3d;
  border-radius: 6px;
  padding: 10px 14px;
  font-family: 'Inconsolata', monospace;
  font-size: 12px;
  color: #e8e2d8;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 999;
  min-width: 180px;
}
.tooltip.show { opacity: 1; }
.tooltip .t-name { font-size: 13px; font-weight: 500; margin-bottom: 6px; }
.tooltip .t-row { display: flex; justify-content: space-between; gap: 1.5rem; color: #7a8898; margin-bottom: 3px; }
.tooltip .t-row span:last-child { color: #e8e2d8; }

/* Legend */
.legend { padding: 0.5rem 2.5rem 1rem; flex-shrink: 0; display: flex; flex-wrap: wrap; gap: 0.5rem 1.5rem; }
.leg-item { display: flex; align-items: center; gap: 0.4rem; font-family: 'Inconsolata', monospace; font-size: 0.65rem; color: #7a8898; cursor: pointer; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.leg-item:hover .leg-name { color: #e8e2d8; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span class="tag">Public Health · Roosevelt Boulevard Subway</span>
  </div>
  <h1>Station Profile — Three Public Health Indicators</h1>
  <div class="subtitle">Hover over a line to highlight a station &nbsp;·&nbsp; Each line connects SVI, Crash Count, and Car-Free Household Rate</div>
</div>

<svg id="chart" style="width:100%;display:block;"></svg>

<div class="legend" id="legend"></div>

<div class="tooltip" id="tooltip"></div>

<script>
const stations = [
  { name: "Bustleton",   svi: 0.916, crashes: 18, carfree: 18.0 },
  { name: "Rising Sun",  svi: 0.924, crashes: 9,  carfree: 17.9 },
  { name: "Cottman",     svi: 0.746, crashes: 12, carfree: 15.4 },
  { name: "Broad-Erie",  svi: 0.975, crashes: 7,  carfree: 43.9 },
  { name: "North 9th",   svi: 0.953, crashes: 7,  carfree: 37.3 },
  { name: "Welsh-Grant", svi: 0.836, crashes: 8,  carfree: 9.8  },
  { name: "Adams",       svi: 0.909, crashes: 5,  carfree: 19.9 },
  { name: "Pratt",       svi: 0.898, crashes: 4,  carfree: 17.2 },
  { name: "Rhawn",       svi: 0.726, crashes: 4,  carfree: 12.3 },
  { name: "Red Lion",    svi: 0.870, crashes: 0,  carfree: 10.4 },
  { name: "Southampton", svi: 0.751, crashes: 1,  carfree: 6.8  },
  { name: "Old Lincoln", svi: 0.416, crashes: 0,  carfree: 1.6  },
];

const colors = [
  "#e05a3a","#4a9ebb","#5aad8f","#9b7ec8",
  "#d4874a","#3dbdaa","#e8a838","#6b8fd4",
  "#c2556e","#7ec87a","#a07ec8","#c8b87e"
];

const dims = [
  { key: "svi",     label: "Social Vulnerability\nIndex (SVI)",  format: d => d.toFixed(3) },
  { key: "crashes", label: "Serious Crashes\nin Walkshed",       format: d => d + " crashes" },
  { key: "carfree", label: "Car-Free\nHouseholds %",             format: d => d.toFixed(1) + "%" },
];

const svg = d3.select("#chart");
const tooltip = document.getElementById("tooltip");

function draw() {
  svg.selectAll("*").remove();

  const W = window.innerWidth;
  const H = window.innerHeight - document.querySelector('.header').offsetHeight - document.querySelector('.legend').offsetHeight - 10;
  const margin = { top: 50, right: 80, bottom: 30, left: 80 };
  const innerW = W - margin.left - margin.right;
  const innerH = H - margin.top - margin.bottom;

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  // X positions for each axis
  const xScale = d3.scalePoint()
    .domain(dims.map(d => d.key))
    .range([0, innerW])
    .padding(0.1);

  // Y scales per dimension
  const yScales = {};
  dims.forEach(dim => {
    const vals = stations.map(s => s[dim.key]);
    const ext = d3.extent(vals);
    const pad = (ext[1] - ext[0]) * 0.1;
    yScales[dim.key] = d3.scaleLinear()
      .domain([ext[0] - pad, ext[1] + pad])
      .range([innerH, 0]);
  });

  // Draw axes
  dims.forEach(dim => {
    const x = xScale(dim.key);
    const ax = g.append("g").attr("transform", `translate(${x},0)`);

    // axis line
    ax.append("line")
      .attr("y1", 0).attr("y2", innerH)
      .attr("class", "axis-line");

    // ticks
    const ticks = yScales[dim.key].ticks(5);
    ticks.forEach(t => {
      ax.append("text")
        .attr("y", yScales[dim.key](t))
        .attr("x", -8)
        .attr("dy", "0.32em")
        .attr("text-anchor", "end")
        .attr("class", "axis-tick")
        .text(dim.key === "svi" ? t.toFixed(2) : dim.key === "carfree" ? t + "%" : t);

      ax.append("line")
        .attr("x1", -4).attr("x2", 4)
        .attr("y1", yScales[dim.key](t))
        .attr("y2", yScales[dim.key](t))
        .attr("stroke", "#1f2d3d")
        .attr("stroke-width", 1);
    });

    // label (multi-line)
    const lines = dim.label.split("\n");
    const labelG = ax.append("g").attr("transform", `translate(0, ${-20})`);
    lines.forEach((line, i) => {
      labelG.append("text")
        .attr("text-anchor", "middle")
        .attr("dy", i === 0 ? `-${(lines.length - 1) * 0.6}em` : "1.2em")
        .attr("class", "axis-label")
        .text(line);
    });
  });

  // Line generator
  const lineGen = d3.line()
    .x(d => xScale(d.dim))
    .y(d => yScales[d.dim](d.val))
    .curve(d3.curveCatmullRom.alpha(0.5));

  // Draw lines
  stations.forEach((s, i) => {
    const pathData = dims.map(dim => ({ dim: dim.key, val: s[dim.key] }));

    g.append("path")
      .datum(pathData)
      .attr("class", "station-line")
      .attr("id", `line-${i}`)
      .attr("stroke", colors[i])
      .attr("d", lineGen)
      .on("mouseover", function(event) { highlight(i, event, s); })
      .on("mousemove", function(event) { moveTooltip(event); })
      .on("mouseleave", function() { unhighlight(); });

    // Dots at each axis
    dims.forEach(dim => {
      g.append("circle")
        .attr("class", "station-dot")
        .attr("id", `dot-${i}-${dim.key}`)
        .attr("cx", xScale(dim.key))
        .attr("cy", yScales[dim.key](s[dim.key]))
        .attr("r", 5)
        .attr("fill", colors[i])
        .on("mouseover", function(event) { highlight(i, event, s); })
        .on("mousemove", function(event) { moveTooltip(event); })
        .on("mouseleave", function() { unhighlight(); });
    });
  });

  // Legend
  const legendEl = document.getElementById("legend");
  legendEl.innerHTML = "";
  stations.forEach((s, i) => {
    const item = document.createElement("div");
    item.className = "leg-item";
    item.innerHTML = `<div class="leg-dot" style="background:${colors[i]}"></div><span class="leg-name">${s.name}</span>`;
    item.addEventListener("mouseover", () => {
      highlight(i, null, s);
    });
    item.addEventListener("mouseleave", unhighlight);
    legendEl.appendChild(item);
  });
}

function highlight(idx, event, s) {
  d3.selectAll(".station-line").classed("faded", true).classed("highlighted", false);
  d3.selectAll(".station-dot").classed("faded", true).classed("highlighted", false);
  d3.select(`#line-${idx}`).classed("faded", false).classed("highlighted", true);
  dims.forEach(dim => {
    d3.select(`#dot-${idx}-${dim.key}`).classed("faded", false).classed("highlighted", true);
  });

  tooltip.innerHTML = `
    <div class="t-name" style="color:${colors[idx]}">${s.name}</div>
    <div class="t-row"><span>SVI</span><span>${s.svi.toFixed(3)}</span></div>
    <div class="t-row"><span>Serious Crashes</span><span>${s.crashes}</span></div>
    <div class="t-row"><span>Car-Free HH%</span><span>${s.carfree.toFixed(1)}%</span></div>
  `;
  tooltip.classList.add("show");
  if (event) moveTooltip(event);
}

function moveTooltip(event) {
  const x = event.clientX + 16;
  const y = event.clientY - 40;
  tooltip.style.left = Math.min(x, window.innerWidth - 220) + "px";
  tooltip.style.top = Math.max(y, 10) + "px";
}

function unhighlight() {
  d3.selectAll(".station-line").classed("faded", false).classed("highlighted", false);
  d3.selectAll(".station-dot").classed("faded", false).classed("highlighted", false);
  tooltip.classList.remove("show");
}

function redraw() {
  const headerH = document.querySelector('.header') ? document.querySelector('.header').offsetHeight : 0;
  const legendH = document.querySelector('.legend') ? document.querySelector('.legend').offsetHeight : 0;
  const svgH = window.innerHeight - headerH - legendH - 10;
  document.getElementById('chart').style.height = Math.max(svgH, 200) + 'px';
  draw();
}

// Run on load
redraw();

// Run again after short delay to catch iframe resize
setTimeout(redraw, 100);
setTimeout(redraw, 500);

// Listen for resize
window.addEventListener("resize", redraw);

// Listen for visibility change (when iframe becomes visible)
document.addEventListener("visibilitychange", () => {
  if (!document.hidden) setTimeout(redraw, 100);
});
</script>
</body>
</html>
